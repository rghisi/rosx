name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Unit Tests & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview, rustfmt, clippy, miri

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-audit

      - name: Dependency audit
        run: cargo audit

      - name: Miri (collections)
        run: cargo miri test -p collections

      - name: Run tests with coverage
        run: cargo llvm-cov -p collections -p system -p usrlib -p kernel --html --output-dir coverage-report -- --test-threads=1

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/

      - name: Generate coverage summary
        run: |
          echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          cargo llvm-cov -p collections -p system -p usrlib -p kernel --text >> $GITHUB_STEP_SUMMARY

  build:
    name: Build Kernel (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
            apps/hello_elf/target/
            apps/snake/target/
            apps/tetris/target/
            apps/conway/target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build hello_elf
        working-directory: apps/hello_elf
        run: cargo build --release

      - name: Build snake
        working-directory: apps/snake
        run: cargo build --release

      - name: Build tetris
        working-directory: apps/tetris
        run: cargo build --release

      - name: Build conway
        working-directory: apps/conway
        run: cargo build --release

      - name: Build
        working-directory: arch/x86_64
        run: cargo build --release

      - name: Create disk image
        run: cargo run --manifest-path arch/x86_64-runner/Cargo.toml -- target/rosx/release/rosx x86_64 --no-run

      - name: Upload disk image
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: rosx-x86_64
          path: target/rosx/release/rosx-x86_64.img
          if-no-files-found: error

  build-x86_32:
    name: Build Kernel (x86_32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
            apps/hello_elf/target/
            apps/snake/target/
            apps/tetris/target/
            apps/conway/target/
          key: ${{ runner.os }}-cargo-build-x86_32-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-x86_32-

      - name: Build hello_elf (x86_32)
        working-directory: apps/hello_elf
        run: cargo build --release --target ../../arch/x86_32/rosx-i686-user.json

      - name: Build snake (x86_32)
        working-directory: apps/snake
        run: cargo build --release --target ../../arch/x86_32/rosx-i686-user.json

      - name: Build tetris (x86_32)
        working-directory: apps/tetris
        run: cargo build --release --target ../../arch/x86_32/rosx-i686-user.json

      - name: Build conway (x86_32)
        working-directory: apps/conway
        run: cargo build --release --target ../../arch/x86_32/rosx-i686-user.json

      - name: Install image tools
        run: sudo apt-get install -y grub-pc-bin grub-common xorriso mtools

      - name: Build bootable image
        run: bash arch/x86_32/build-image.sh

      - name: Upload disk image
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: rosx-x86_32
          path: target/rosx-i686/release/rosx-x86_32.img
          if-no-files-found: error

  deploy-coverage:
    name: Deploy Coverage Report
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create Release
    needs: [test, build, build-x86_32]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Get current date
        id: date
        run: |
          echo "date_name=$(date -u +'%Y-%m-%d %H%M%S')" >> $GITHUB_OUTPUT
          echo "date_tag=$(date -u +'%Y-%m-%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Download x86_64 disk image
        uses: actions/download-artifact@v4
        with:
          name: rosx-x86_64

      - name: Download x86_32 disk image
        uses: actions/download-artifact@v4
        with:
          name: rosx-x86_32

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

      - name: Compress artifacts
        run: |
          gzip -9 rosx-x86_64.img
          gzip -9 rosx-x86_32.img
          tar -czf coverage-report.tar.gz -C coverage-report .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.date_tag }}
          name: ${{ steps.date.outputs.date_name }}
          files: |
            rosx-x86_64.img.gz
            rosx-x86_32.img.gz
            coverage-report.tar.gz
