name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Test collections
        run: cargo test -p collections

      - name: Test kernel
        run: cargo test -p kernel -- --test-threads=1

  build:
    name: Build Kernel (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
            apps/hello_elf/target/
            apps/snake/target/
            apps/tetris/target/
            apps/conway/target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build hello_elf
        working-directory: apps/hello_elf
        run: cargo build --release

      - name: Build snake
        working-directory: apps/snake
        run: cargo build --release

      - name: Build tetris
        working-directory: apps/tetris
        run: cargo build --release

      - name: Build conway
        working-directory: apps/conway
        run: cargo build --release

      - name: Build
        working-directory: arch/x86_64
        run: cargo build --release

      - name: Create disk image
        run: cargo run --manifest-path arch/x86_64-runner/Cargo.toml -- target/rosx/release/rosx x86_64 --no-run

      - name: Upload disk image
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: rosx-x86_64
          path: target/rosx/release/rosx-x86_64.img
          if-no-files-found: error

  build-x86_32:
    name: Build Kernel (x86_32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-build-x86_32-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-x86_32-

      - name: Build
        working-directory: arch/x86_32
        run: cargo build --release

      - name: Upload kernel binary
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: rosx-x86_32
          path: target/rosx-i686/release/rosx-x86
          if-no-files-found: error

  release:
    name: Create Release
    needs: [test, build, build-x86_32]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Get current date
        id: date
        run: |
          echo "date_name=$(date -u +'%Y-%m-%d %H%M%S')" >> $GITHUB_OUTPUT
          echo "date_tag=$(date -u +'%Y-%m-%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Download x86_64 disk image
        uses: actions/download-artifact@v4
        with:
          name: rosx-x86_64

      - name: Download x86_32 kernel binary
        uses: actions/download-artifact@v4
        with:
          name: rosx-x86_32

      - name: Compress artifacts
        run: |
          gzip -9 rosx-x86_64.img
          mv rosx-x86 rosx-x86_32
          gzip -9 rosx-x86_32

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.date_tag }}
          name: ${{ steps.date.outputs.date_name }}
          files: |
            rosx-x86_64.img.gz
            rosx-x86_32.gz
