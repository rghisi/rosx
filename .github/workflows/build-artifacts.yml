name: Build Artifacts

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-x86_64:
    name: Build Kernel (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
            apps/hello_elf/target/
            apps/snake/target/
            apps/tetris/target/
            apps/conway/target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build hello_elf
        working-directory: apps/hello_elf
        run: cargo build --release

      - name: Build snake
        working-directory: apps/snake
        run: cargo build --release

      - name: Build tetris
        working-directory: apps/tetris
        run: cargo build --release

      - name: Build conway
        working-directory: apps/conway
        run: cargo build --release

      - name: Build kernel
        working-directory: arch/x86_64
        run: cargo build --release

      - name: Create disk image
        run: cargo run --manifest-path arch/x86_64-runner/Cargo.toml -- target/rosx/release/rosx x86_64 --no-run

      - name: Upload disk image
        uses: actions/upload-artifact@v4
        with:
          name: rosx-x86_64
          path: target/rosx/release/rosx-x86_64.img
          if-no-files-found: error
          retention-days: 1

  build-x86_32:
    name: Build Kernel (x86_32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
            apps/hello_elf/target/
            apps/snake/target/
            apps/tetris/target/
            apps/conway/target/
          key: ${{ runner.os }}-cargo-build-x86_32-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-x86_32-

      - name: Build hello_elf (x86_32)
        working-directory: apps/hello_elf
        run: cargo build --release --target ../../arch/x86_32/rosx-i686-user.json

      - name: Build snake (x86_32)
        working-directory: apps/snake
        run: cargo build --release --target ../../arch/x86_32/rosx-i686-user.json

      - name: Build tetris (x86_32)
        working-directory: apps/tetris
        run: cargo build --release --target ../../arch/x86_32/rosx-i686-user.json

      - name: Build conway (x86_32)
        working-directory: apps/conway
        run: cargo build --release --target ../../arch/x86_32/rosx-i686-user.json

      - name: Install image tools
        run: sudo apt-get install -y grub-pc-bin grub-common xorriso mtools

      - name: Build bootable image
        run: bash arch/x86_32/build-image.sh

      - name: Upload disk image
        uses: actions/upload-artifact@v4
        with:
          name: rosx-x86_32
          path: target/rosx-i686/release/rosx-x86_32.img
          if-no-files-found: error
          retention-days: 1
